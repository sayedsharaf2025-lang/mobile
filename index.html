<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فودافون - معالج الإكسيل المطور</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --red: #e60000; --green: #1a9e4a; --blue: #0077cc; --text: #1a1d23; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f0f2f5; color: var(--text); padding-bottom: 80px; }
        .header { background: var(--red); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 52px; z-index: 99; }
        .tab-btn { flex: 1; padding: 15px 5px; font-size: 13px; font-weight: 700; border: none; background: none; border-bottom: 3px solid transparent; cursor: pointer; color: #666; }
        .tab-btn.active { color: var(--red); border-bottom-color: var(--red); background: #fff5f5; }
        .container { padding: 15px; max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-right: 5px solid var(--red); }
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        th { background: #f8f9fa; }
        .upload-zone { border: 2px dashed #bbb; padding: 30px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .upload-zone:hover { border-color: var(--red); background: #fff5f5; }
        .hidden { display: none !important; }
        .btn-green { background: var(--green); color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-blue { background: var(--blue); color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h3>نظام تحصيل فودافون (معالجة الملفات)</h3></div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('settings', this)">⚙️ الإعدادات (رفع الإكسيل)</button>
    <button class="tab-btn" onclick="switchTab('lines', this)">📋 الخطوط</button>
    <button class="tab-btn" onclick="switchTab('alerts', this)">⚠️ التنبيهات والأرباح</button>
</div>

<div class="container">
    <div id="tab-settings">
        <div class="card">
            <h3>📥 خطوة 1: استيراد الأسماء من الإكسيل</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">ارفع الملف الذي يحتوي على (الرقم، الاسم، خطة الأسعار)</p>
            <div class="upload-zone" onclick="document.getElementById('excelFile').click()">
                <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" hidden onchange="importExcel(this)">
                <b>انقر هنا لاختيار ملف الإكسيل</b>
            </div>
            <div id="importStatus" style="margin-top:10px; font-weight:bold; color:var(--green);"></div>
        </div>

        <div class="card">
            <h3>🗄️ المخزن الحالي (الأسماء المسجلة)</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>الرقم</th><th>الخطة</th><th>حذف</th></tr>
                    </thead>
                    <tbody id="storeBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-lines" class="hidden">
        <div class="card">
            <h3>📋 قائمة التحصيل</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>الرقم</th><th>خطة الأسعار</th><th>سعرك (+45%)</th><th>الحالة</th></tr>
                    </thead>
                    <tbody id="linesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-alerts" class="hidden">
        <div class="card">
            <h3>⚠️ المبالغ المتبقية</h3>
            <div id="alertsList"></div>
        </div>
    </div>
</div>

<script>
    let store = JSON.parse(localStorage.getItem('voda_store')) || {};
    let monthsData = JSON.parse(localStorage.getItem('voda_months')) || {};

    function switchTab(t, b) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(`tab-${t}`).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        if(t === 'settings') renderStore();
        if(t === 'lines') renderLines();
    }

    // --- دالة استيراد الإكسيل المطورة ---
    function importExcel(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet);

            let count = 0;
            json.forEach(row => {
                // محاولة إيجاد الأعمدة بأي مسمى قريب (الرقم أو الرقم أو phone)
                let ph = row['الرقم'] || row['رقم الخط'] || row['phone'] || row['الرقم '];
                let name = row['الاسم'] || row['اسم العميل'] || row['name'] || row['الاسم'];
                let plan = row['خطة الاسعار'] || row['الباقة'] || row['plan'] || row['خطة الاسعار'];

                if(ph) {
                    let cleanPh = String(ph).trim().replace(/^0+/, ''); // تنظيف الرقم
                    store[cleanPh] = {
                        name: name || "بدون اسم",
                        plan: plan || "غير محدد"
                    };
                    count++;
                }
            });

            localStorage.setItem('voda_store', JSON.stringify(store));
            document.getElementById('importStatus').innerText = `✅ تم استيراد ${count} اسم بنجاح!`;
            renderStore();
        };
        reader.readAsArrayBuffer(file);
    }

    function renderStore() {
        const body = document.getElementById('storeBody');
        body.innerHTML = "";
        for(let ph in store) {
            body.innerHTML += `<tr>
                <td><b>${store[ph].name}</b></td>
                <td>0${ph}</td>
                <td>${store[ph].plan}</td>
                <td><button onclick="deleteFromStore('${ph}')" style="color:red; background:none; border:none; cursor:pointer;">❌</button></td>
            </tr>`;
        }
    }

    function deleteFromStore(ph) {
        delete store[ph];
        localStorage.setItem('voda_store', JSON.stringify(store));
        renderStore();
    }

    function renderLines() {
        const body = document.getElementById('linesBody');
        body.innerHTML = "<tr><td colspan='5'>يرجى رفع فاتورة PDF أولاً لربط المبالغ بالأسماء</td></tr>";
        // هنا يتم استكمال منطق عرض الخطوط المربوطة بالفاتورة كما في الأكواد السابقة
    }

    // التشغيل الأولي
    renderStore();
</script>
</body>
</html>
