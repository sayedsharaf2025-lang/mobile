<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام إدارة فواتير فودافون السحابي الذكي</title>
    
    <!-- الأنماط -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- المكتبات الخارجية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
</head>
<body>

<div class="app-header">
    <h1>☁️ نظام فودافون السحابي الذكي</h1>
    <div class="header-actions">
        <div class="sync-indicator" id="syncStatus">🔄 جاري المزامنة...</div>
        <button class="dark-toggle" onclick="UI.toggleDarkMode()" title="تبديل الوضع الليلي">🌙</button>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="UI.showTab('alerts', this)">
        <span class="tab-icon">⚠️</span>التنبيهات
    </button>
    <button class="tab-btn" onclick="UI.showTab('lines', this)">
        <span class="tab-icon">📋</span>الخطوط
    </button>
    <button class="tab-btn" onclick="UI.showTab('upload', this)">
        <span class="tab-icon">📤</span>رفع الملفات
    </button>
    <button class="tab-btn" onclick="UI.showTab('backup', this)">
        <span class="tab-icon">💾</span>النسخ الاحتياطي
    </button>
    <button class="tab-btn" onclick="UI.showTab('settings', this)">
        <span class="tab-icon">⚙️</span>الإعدادات
    </button>
</div>

<div class="main-content">
    <!-- تبويب التنبيهات -->
    <div id="tab-alerts"></div>

    <!-- تبويب الخطوط -->
    <div id="tab-lines" class="hidden"></div>

    <!-- تبويب رفع الملفات -->
    <div id="tab-upload" class="hidden"></div>

    <!-- تبويب النسخ الاحتياطي -->
    <div id="tab-backup" class="hidden"></div>

    <!-- تبويب الإعدادات -->
    <div id="tab-settings" class="hidden"></div>
</div>

<!-- المودالات -->
<div id="modalContainer"></div>

<!-- السكربتات -->
<script src="data/default.js"></script>
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/backup.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
