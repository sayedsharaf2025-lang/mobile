<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام فودافون للتحصيل المطور</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
font-family:Tahoma;
background:#f5f5f5;
margin:0;
padding-bottom:80px;
}
header{
background:#e60000;
color:#fff;
padding:15px;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}
.container{
padding:10px;
}
.card{
background:#fff;
border-radius:12px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.card h3{
margin-top:0;
color:#e60000;
}
input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}
button{
background:#e60000;
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
}
button:hover{
opacity:.9;
}
.table-wrap{
overflow:auto;
}
table{
width:100%;
border-collapse:collapse;
min-width:700px;
}
th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}
th{
background:#e60000;
color:#fff;
}
.badge-paid{background:#22c55e;color:#fff;padding:4px 8px;border-radius:20px;}
.badge-unpaid{background:#ef4444;color:#fff;padding:4px 8px;border-radius:20px;}
.badge-partial{background:#f59e0b;color:#fff;padding:4px 8px;border-radius:20px;}
.tabbar{
position:fixed;
bottom:0;
right:0;
left:0;
display:flex;
background:#fff;
border-top:1px solid #ccc;
}
.tabbar button{
flex:1;
border-radius:0;
margin:0;
background:#fff;
color:#333;
border:none;
padding:12px;
}
.tabbar button.active{
background:#e60000;
color:#fff;
}
.hidden{display:none;}
.flex{
display:flex;
gap:10px;
}
</style>
</head>
<body>

<header>
📱 نظام فودافون للتحصيل المطور
</header>

<div class="container">

<div id="tab-search">
<div class="card">
<h3>🔍 البحث والتحصيل</h3>
<input type="text" id="searchInput" placeholder="ابحث بالاسم أو الرقم" oninput="searchClient()">
<div id="searchResults"></div>
</div>
</div>

<div id="tab-lines" class="hidden">
<div class="card">
<h3>📋 الخطوط المفوترة</h3>
<input type="month" id="invoiceMonth">
<button onclick="loadInvoices()">عرض الفواتير</button>
<button onclick="payAllInvoices()">تحصيل جميع الخطوط</button>
</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>الرقم</th>
<th>الشهر</th>
<th>الباقة</th>
<th>المطلوب</th>
<th>المدفوع</th>
<th>المتبقي</th>
<th>الحالة</th>
<th>إجراء</th>
</tr>
</thead>
<tbody id="invoiceTable"></tbody>
</table>
</div>
</div>

<div id="tab-upload" class="hidden">
<div class="card">
<h3>📤 رفع الفواتير</h3>
<input type="month" id="uploadMonth">
<input type="file" id="invoiceFiles" multiple accept=".xlsx,.xls">
<button onclick="processInvoices()">رفع الفواتير</button>
<div id="uploadStatus"></div>
</div>
</div>

<div id="tab-clients" class="hidden">
<div class="card">
<h3>👥 بيانات الخطوط</h3>
<input type="file" id="clientsExcel" accept=".xlsx,.xls">
<button onclick="importClientsExcel()">استيراد Excel</button>
</div>

<div class="card">
<h3>➕ إضافة خط</h3>
<input type="text" id="clientName" placeholder="الاسم">
<input type="text" id="clientPhone" placeholder="الرقم">
<select id="clientPackage"></select>
<input type="number" id="clientPrice" placeholder="السعر">
<button onclick="saveClient()">حفظ</button>
</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>الرقم</th>
<th>الباقة</th>
<th>السعر</th>
<th>إجراء</th>
</tr>
</thead>
<tbody id="clientsTable"></tbody>
</table>
</div>
</div>

<div id="tab-packages" class="hidden">
<div class="card">
<h3>💳 أسعار الباقات</h3>
<div class="flex">
<select id="packageName"></select>
<input type="number" id="packagePrice" placeholder="السعر">
</div>
<button onclick="savePackagePrice()">حفظ السعر</button>
</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>الباقة</th>
<th>السعر</th>
</tr>
</thead>
<tbody id="packagesTable"></tbody>
</table>
</div>
</div>

</div>

<div class="tabbar">
<button class="active" onclick="showTab('search',this)">بحث</button>
<button onclick="showTab('lines',this)">الفواتير</button>
<button onclick="showTab('upload',this)">رفع</button>
<button onclick="showTab('clients',this)">الخطوط</button>
<button onclick="showTab('packages',this)">الباقات</button>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBfFRxvmhg8aqtuDgXAOofFGpVPklUF-gs",
authDomain: "mobile-invoic-118d4.firebaseapp.com",
projectId: "mobile-invoic-118d4",
databaseURL: "https://mobile-invoic-118d4-default-rtdb.firebaseio.com/",
storageBucket: "mobile-invoic-118d4.firebasestorage.app",
messagingSenderId: "795305971254",
appId: "1:795305971254:web:7e8e874cfd805d33ec1297"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let clients = {};
let invoices = {};
let packagePrices = {};

const packageList = [
"Flex 45 Revamp",
"Flex 52 Revamp",
"Flex 60 Revamp",
"Flex 90 Revamp",
"Flex 125 Revamp",
"2022 Business Flex 65",
"2025 Business Flex 70",
"2025 Business Flex 100",
"2025 Business Flex 150",
"Free SPOC Flex45"
];

function initPackages(){
const select1=document.getElementById('clientPackage');
const select2=document.getElementById('packageName');

packageList.forEach(p=>{
select1.innerHTML += `<option value="${p}">${p}</option>`;
select2.innerHTML += `<option value="${p}">${p}</option>`;
});
}

function showTab(tab,btn){
['search','lines','upload','clients','packages'].forEach(t=>{
document.getElementById('tab-'+t).classList.add('hidden');
});

document.getElementById('tab-'+tab).classList.remove('hidden');

document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

function loadData(){
db.ref('clients').on('value',s=>{
clients=s.val()||{};
renderClients();
});

 db.ref('invoices').on('value',s=>{
invoices=s.val()||{};
});

 db.ref('packagePrices').on('value',s=>{
packagePrices=s.val()||{};
renderPackages();
});
}

function saveClient(){
const name=document.getElementById('clientName').value;
let phone=document.getElementById('clientPhone').value;
const packageType=document.getElementById('clientPackage').value;
const basePrice=parseFloat(document.getElementById('clientPrice').value)||0;

phone=phone.replace(/^0/, '');

if(!phone) return alert('أدخل الرقم');

const data={
name,
packageType,
basePrice,
prepaidBalance:0
};

 db.ref('clients/'+phone).update(data).then(()=>{
alert('تم الحفظ');
});
}

function renderClients(){
const tbody=document.getElementById('clientsTable');
tbody.innerHTML='';

Object.keys(clients).forEach(phone=>{
const c=clients[phone];

tbody.innerHTML += `
<tr>
<td>${c.name||''}</td>
<td>0${phone}</td>
<td>${c.packageType||''}</td>
<td>${c.basePrice||0}</td>
<td>
<button onclick="editClient('${phone}')">تعديل</button>
<button onclick="deleteClient('${phone}')">حذف</button>
</td>
</tr>`;
});
}

function deleteClient(phone){
if(!confirm('هل تريد حذف الخط؟')) return;

 db.ref('clients/'+phone).remove().then(()=>{
alert('تم الحذف');
});
}

function editClient(phone){
const c=clients[phone];

document.getElementById('clientName').value=c.name||'';
document.getElementById('clientPhone').value=phone;
document.getElementById('clientPackage').value=c.packageType||'';
document.getElementById('clientPrice').value=c.basePrice||0;
}

function savePackagePrice(){
const name=document.getElementById('packageName').value;
const price=parseFloat(document.getElementById('packagePrice').value)||0;

 db.ref('packagePrices/'+name).set(price).then(()=>{
alert('تم حفظ السعر');
});
}

function renderPackages(){
const tbody=document.getElementById('packagesTable');
tbody.innerHTML='';

Object.keys(packagePrices).forEach(name=>{

tbody.innerHTML += `
<tr>
<td>${name}</td>
<td>${packagePrices[name]}</td>
</tr>`;
});
}

function importClientsExcel(){
const file=document.getElementById('clientsExcel').files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:'array'});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{header:1});

let updates={};

for(let i=1;i<rows.length;i++){
const row=rows[i];
if(!row[0]) continue;

let phone=String(row[0]).replace(/^0/, '');

updates[phone]={
name:row[1]||'',
packageType:row[2]||'',
basePrice:parseFloat(row[3])||0,
prepaidBalance:0
};
}

 db.ref('clients').update(updates).then(()=>{
alert('تم استيراد البيانات');
});
};

reader.readAsArrayBuffer(file);
}

function processInvoices(){
const files=document.getElementById('invoiceFiles').files;
const month=document.getElementById('uploadMonth').value;

if(files.length===0) return;

Array.from(files).forEach(file=>{
const reader=new FileReader();

reader.onload=function(e){
const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:'array'});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{header:1});

let updates={};

for(let i=1;i<rows.length;i++){
const row=rows[i];
if(!row[0]) continue;

let phone=String(row[0]).replace(/^0/, '');
let amount=parseFloat(row[1])||0;

const old=invoices?.[month]?.[phone]?.requiredAmount||0;

updates[phone]={
phone,
name:clients[phone]?.name||'',
package:clients[phone]?.packageType||'',
requiredAmount:old+amount,
paidAmount:0,
isPaid:false,
month
};
}

 db.ref('invoices/'+month).update(updates);
};

reader.readAsArrayBuffer(file);
});

alert('تم رفع الفواتير');
}

function loadInvoices(){
const month=document.getElementById('invoiceMonth').value;
const tbody=document.getElementById('invoiceTable');
tbody.innerHTML='';

const data=invoices[month]||{};

Object.keys(data).forEach(phone=>{
const inv=data[phone];
const remaining=(inv.requiredAmount||0)-(inv.paidAmount||0);

let badge='';

if(inv.isPaid){
badge='<span class="badge-paid">مدفوع</span>';
}else if(inv.paidAmount>0){
badge='<span class="badge-partial">جزئي</span>';
}else{
badge='<span class="badge-unpaid">غير مدفوع</span>';
}

tbody.innerHTML += `
<tr>
<td>${inv.name}</td>
<td>0${phone}</td>
<td>${month}</td>
<td>${inv.package}</td>
<td>${inv.requiredAmount}</td>
<td>${inv.paidAmount}</td>
<td>${remaining}</td>
<td>${badge}</td>
<td>
<button onclick="payInvoice('${month}','${phone}')">تحصيل</button>
<button onclick="cancelPayment('${month}','${phone}')">إلغاء</button>
</td>
</tr>`;
});
}

function payInvoice(month,phone){
const amount=prompt('أدخل المبلغ');
if(!amount) return;

 db.ref('invoices/'+month+'/'+phone).once('value').then(s=>{
const inv=s.val();

let paid=(inv.paidAmount||0)+parseFloat(amount);
let isPaid=paid>=inv.requiredAmount;

 db.ref('invoices/'+month+'/'+phone).update({
paidAmount:paid,
isPaid
});

 db.ref('paymentHistory/'+month+'/'+phone).push({
type:'payment',
amount,
date:new Date().toISOString()
});

loadInvoices();
});
}

function cancelPayment(month,phone){
if(!confirm('إلغاء الدفع؟')) return;

 db.ref('invoices/'+month+'/'+phone).update({
paidAmount:0,
isPaid:false
});

 db.ref('paymentHistory/'+month+'/'+phone).push({
type:'cancel',
date:new Date().toISOString()
});

loadInvoices();
}

function payAllInvoices(){
const month=document.getElementById('invoiceMonth').value;
const data=invoices[month]||{};

Object.keys(data).forEach(phone=>{
const inv=data[phone];

 db.ref('invoices/'+month+'/'+phone).update({
paidAmount:inv.requiredAmount,
isPaid:true
});
});

alert('تم تحصيل جميع الفواتير');
loadInvoices();
}

function searchClient(){
const q=document.getElementById('searchInput').value.toLowerCase();
const results=document.getElementById('searchResults');
results.innerHTML='';

let totalRequired=0;
let totalPaid=0;

Object.keys(clients).forEach(phone=>{
const c=clients[phone];

if((c.name||'').toLowerCase().includes(q)||phone.includes(q)){

let html='';

Object.keys(invoices).forEach(month=>{
const inv=invoices[month]?.[phone];

if(inv){
const remaining=inv.requiredAmount-inv.paidAmount;

totalRequired += inv.requiredAmount;
totalPaid += inv.paidAmount;

html += `
<div style="padding:10px;border:1px solid #ddd;margin-top:8px;border-radius:8px;">
<b>${month}</b><br>
المطلوب: ${inv.requiredAmount} | المدفوع: ${inv.paidAmount} | المتبقي: ${remaining}
</div>`;
}
});

results.innerHTML += `
<div class="card">
<h3>${c.name}</h3>
<div>📱 0${phone}</div>
<div>💳 ${c.packageType}</div>
<div>💰 رصيد مقدم: ${c.prepaidBalance||0}</div>
${html}
</div>`;
}
});
}

initPackages();
loadData();

</script>

</body>
</html>
